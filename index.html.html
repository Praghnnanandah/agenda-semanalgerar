<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Agenda Semanal</title>

<style>
body {
    font-family: Arial;
    background: #121212;
    color: white;
    text-align: center;
}

button {
    padding: 10px;
    margin: 10px;
    cursor: pointer;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

td, th {
    border: 1px solid #444;
    padding: 5px;
}

textarea {
    width: 100%;
    height: 60px;
    background: #222;
    color: white;
    border: none;
}
</style>
</head>

<body>

<h1>📅 Agenda</h1>

<div id="menu"></div>
<div id="agenda" style="display:none;"></div>

<script>
const pessoas = ["Israel","Edygar","Matheus","Jhonathan","Calleb"];
const horas = ["08:00","09:00","10:00","11:00","12:00"];

const menu = document.getElementById("menu");
const agenda = document.getElementById("agenda");

// criar botões
pessoas.forEach(nome => {
    let btn = document.createElement("button");
    btn.innerText = nome;
    btn.onclick = () => abrir(nome);
    menu.appendChild(btn);
});

function abrir(nome){
    menu.style.display = "none";
    agenda.style.display = "block";

    let html = `<button onclick="voltar()">Voltar</button>`;
    html += `<h2>${nome}</h2>`;

    html += `<table>`;
    html += `<tr><th>Hora</th><th>Anotação</th></tr>`;

    horas.forEach(hora => {
        const id = `${nome}_${hora}`;
        html += `<tr>
            <td>${hora}</td>
            <td><textarea id="${id}" oninput="salvar(this)"></textarea></td>
        </tr>`;
    });

    html += `</table>`;

    agenda.innerHTML = html;

    carregar();
}

function voltar(){
    agenda.style.display = "none";
    menu.style.display = "block";
}

function salvar(campo){
    localStorage.setItem(campo.id, campo.value);
}

function carregar(){
    document.querySelectorAll("textarea").forEach(campo => {
        campo.value = localStorage.getItem(campo.id) || "";
    });
}
</script>

</body>
</html>
